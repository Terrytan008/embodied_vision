name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: 安装 ROS2 Jazzy
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: 安装依赖
        run: |
          source /opt/ros/jazzy/setup.bash
          sudo apt update
          sudo apt install -y \
            python3-colcon-common-extensions \
            python3-pip \
            libopencv-dev \
            python3-opencv \
            python3-numpy \
            libgtest-dev \
            cmake

      - name: 构建
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --merge-install --cmake-args -DCMAKE_BUILD_TYPE=Release

      - name: 运行测试
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon test --merge-install \
            --event-handlers console_direct+ \
            --cmake-args -DCMAKE_BUILD_TYPE=Release \
            --return-code-on-test-failure
          colcon test-result --verbose

      - name: 运行 GTest 单元测试
        run: |
          source /opt/ros/jazzy/setup.bash
          # 直接运行测试可执行文件
          cd build/stereo_vision_driver
          if [ -f test/test_stereo_depth ]; then
            ./test/test_stereo_depth --gtest_output=xml:test_detail/
            echo "=== GTest 结果 ==="
            cat test_detail/test_detail.xml || echo "无 XML 结果"
          else
            echo "测试可执行文件不存在（可能需要 GTest）"
          fi

      - name: 构建并测试 stereo_vision_calibration
        run: |
          source /opt/ros/jazzy/setup.bash
          cd src/stereo_vision_calibration
          pip install opencv-python numpy torch --quiet
          python3 scripts/train_confidence.py --help 2>/dev/null && echo "train_confidence.py OK" || echo "train_confidence.py 有错误"
          python3 scripts/export_onnx.py --help 2>/dev/null && echo "export_onnx.py OK" || echo "export_onnx.py 有错误"

  python-lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Python Lint
        run: |
          pip install flake8 pyflakes
          flake8 src/stereo_vision_calibration/scripts/ \
            --max-line-length=120 \
            --ignore=E501,W503,E302 \
            || true

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 检查文档
        run: |
          echo "=== docs/developer_guide/ ==="
          ls -la docs/developer_guide/
          echo "=== 文档文件行数 ==="
          wc -l docs/developer_guide/*.md
